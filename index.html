<style>
:root{
  --purple-deep:#2A1B4A;
  --purple-dark:#3D2563;
  --purple-main:#6B4BC9;
  --purple-light:#9A7FE0;
  --lilac:#C8B5F2;
  --rose-soft:#F4C9D8;
  --gold-warm:#E8B86B;
  --cream:#FAF5EC;
  --white-pure:#FFFFFF;
  --ink:#1A0F2E;
  --ink-soft:#4A3B6B;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden}

body{
  font-family:'Inter',sans-serif;
  background:var(--purple-deep);
  color:var(--cream);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  position:relative;
}

/* Animated gradient background */
.bg-gradient{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(107,75,201,0.4) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(154,127,224,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(232,184,107,0.15) 0%,transparent 50%),
    linear-gradient(180deg,#1A0F2E 0%,#2A1B4A 50%,#3D2563 100%);
  animation:gradientShift 20s ease-in-out infinite;
}
@keyframes gradientShift{
  0%,100%{transform:scale(1) translate(0,0)}
  50%{transform:scale(1.1) translate(-2%,2%)}
}

/* Noise texture */
.bg-noise{
  position:fixed;inset:0;z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
  opacity:0.08;pointer-events:none;mix-blend-mode:overlay;
}

/* Floating particles (memories drifting) */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--lilac);opacity:0;
  animation:float linear infinite;
  filter:blur(0.5px);
}
.particle.gold{background:var(--gold-warm);box-shadow:0 0 8px rgba(232,184,107,0.6)}
.particle.rose{background:var(--rose-soft);box-shadow:0 0 6px rgba(244,201,216,0.4)}
@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:0.8}
  90%{opacity:0.6}
  100%{transform:translateY(-10vh) translateX(var(--dx,0));opacity:0}
}

/* Header */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:28px 40px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono','SF Mono',monospace;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(250,245,236,0.5);
}
.top-bar .brand{display:flex;align-items:center;gap:10px}
.top-bar .brand-dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold-warm);
  box-shadow:0 0 12px var(--gold-warm);
  animation:pulse 2s ease-in-out infinite;
}
.top-bar .right-group{
  display:flex;align-items:center;gap:20px;
}
@keyframes pulse{
  0%,100%{opacity:0.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.3)}
}

/* Language toggle */
.lang-toggle{
  display:flex;align-items:center;gap:10px;
}
.lang-btn{
  background:transparent;border:none;padding:0;cursor:pointer;
  width:26px;height:18px;
  border-radius:3px;overflow:hidden;
  opacity:0.4;
  transition:opacity 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.lang-btn:hover{opacity:0.75;transform:translateY(-1px)}
.lang-btn.active{
  opacity:1;
  box-shadow:0 0 0 1.5px var(--gold-warm), 0 0 12px rgba(232,184,107,0.4);
}
.lang-btn svg{width:100%;height:100%;display:block}

/* Main */
.main{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 40px 80px;
  text-align:center;
}

/* Elephant */
.elephant-wrap{
  position:relative;margin-bottom:56px;
  animation:fadeInScale 1.6s cubic-bezier(0.2,0.8,0.2,1) both;
}
@keyframes fadeInScale{
  from{opacity:0;transform:scale(0.85) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.elephant-halo{
  position:absolute;inset:-40px;
  background:radial-gradient(circle,rgba(154,127,224,0.35) 0%,transparent 60%);
  animation:haloPulse 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes haloPulse{
  0%,100%{opacity:0.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.15)}
}

.elephant-logo{
  position:relative;width:220px;height:220px;
  filter:drop-shadow(0 20px 40px rgba(107,75,201,0.5));
  animation:elephantBreath 4s ease-in-out infinite;
  object-fit:contain;
  display:block;
}
@keyframes elephantBreath{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* Word mark */
.wordmark{
  font-family:'Fraunces',serif;font-weight:300;
  font-size:clamp(64px,11vw,156px);
  line-height:0.95;letter-spacing:-0.055em;
  color:var(--cream);margin-bottom:8px;
  animation:fadeInUp 1.2s cubic-bezier(0.2,0.8,0.2,1) 0.3s both;
}
.wordmark em{
  font-style:italic;font-weight:400;
  background:linear-gradient(135deg,var(--gold-warm) 0%,var(--rose-soft) 50%,var(--lilac) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

.wordmark-under{
  font-family:'Fraunces',serif;font-weight:300;font-style:italic;
  font-size:clamp(14px,1.4vw,18px);letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(250,245,236,0.45);margin-bottom:72px;
  animation:fadeInUp 1.2s cubic-bezier(0.2,0.8,0.2,1) 0.5s both;
}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* Hero phrase */
.hero-phrase{
  font-family:'Fraunces',serif;font-weight:300;
  font-size:clamp(32px,5.5vw,68px);
  line-height:1.08;letter-spacing:-0.03em;
  color:var(--cream);
  max-width:900px;margin-bottom:28px;
  animation:fadeInUp 1.4s cubic-bezier(0.2,0.8,0.2,1) 0.9s both;
}
.hero-phrase em{
  font-style:italic;font-weight:400;color:var(--gold-warm);
  position:relative;
}
.hero-phrase em::after{
  content:"";position:absolute;left:0;right:0;bottom:-2px;
  height:1px;background:linear-gradient(90deg,transparent,var(--gold-warm),transparent);
  opacity:0.5;
}

.hero-sub{
  font-family:'Fraunces',serif;font-weight:300;font-style:italic;
  font-size:clamp(18px,2.2vw,26px);
  color:rgba(250,245,236,0.7);
  max-width:620px;margin-bottom:80px;
  animation:fadeInUp 1.4s cubic-bezier(0.2,0.8,0.2,1) 1.1s both;
}

/* Email capture */
.capture{
  width:100%;max-width:480px;
  animation:fadeInUp 1.4s cubic-bezier(0.2,0.8,0.2,1) 1.3s both;
}
.capture-label{
  font-family:'Inter',sans-serif;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(250,245,236,0.45);margin-bottom:16px;
}
.capture-form{
  display:flex;gap:8px;padding:6px;
  background:rgba(250,245,236,0.06);
  border:1px solid rgba(250,245,236,0.15);
  border-radius:100px;backdrop-filter:blur(20px);
  transition:all 0.3s ease;
}
.capture-form:focus-within{
  background:rgba(250,245,236,0.1);
  border-color:rgba(232,184,107,0.4);
  box-shadow:0 0 40px rgba(232,184,107,0.15);
}
.capture-input{
  flex:1;background:transparent;border:none;outline:none;
  padding:14px 20px;color:var(--cream);font-family:'Inter',sans-serif;
  font-size:15px;letter-spacing:0.01em;
}
.capture-input::placeholder{color:rgba(250,245,236,0.35)}
.capture-btn{
  background:linear-gradient(135deg,var(--gold-warm) 0%,#D9A555 100%);
  color:var(--ink);border:none;padding:14px 28px;
  border-radius:100px;font-family:'Inter',sans-serif;
  font-weight:600;font-size:14px;cursor:pointer;
  letter-spacing:0.02em;transition:all 0.3s ease;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(232,184,107,0.3);
}
.capture-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 28px rgba(232,184,107,0.5);
}
.capture-btn svg{transition:transform 0.3s ease}
.capture-btn:hover svg{transform:translateX(3px)}

.capture-footer{
  margin-top:16px;font-size:11px;
  color:rgba(250,245,236,0.35);letter-spacing:0.02em;
}

/* Bottom bar */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:24px 40px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono','SF Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(250,245,236,0.3);
}
.bottom-bar a{color:rgba(250,245,236,0.5);text-decoration:none;transition:color 0.3s}
.bottom-bar a:hover{color:var(--gold-warm)}

.bottom-bar .socials{display:flex;gap:16px;align-items:center}

/* Success state */
.capture.success .capture-form{
  background:rgba(232,184,107,0.15);
  border-color:rgba(232,184,107,0.5);
}
.success-msg{
  display:none;font-family:'Fraunces',serif;font-style:italic;
  font-size:17px;color:var(--gold-warm);padding:14px 20px;
  text-align:center;
}
.capture.success .capture-form{display:none}
.capture.success .success-msg{display:block}

@media(max-width:640px){
  .top-bar,.bottom-bar{padding:20px 24px;font-size:10px;letter-spacing:2px}
  .top-bar .right-group{gap:14px}
  .bottom-bar{flex-direction:column;gap:12px}
  .main{padding:90px 24px 120px}
  .elephant-logo{width:170px;height:170px}
  .hero-phrase{margin-bottom:20px}
  .hero-sub{margin-bottom:48px}
  .capture-form{flex-direction:column;border-radius:20px;padding:8px}
  .capture-btn{justify-content:center;border-radius:14px}
  .capture-input{text-align:center}
  .lang-btn{width:22px;height:15px}
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-noise"></div>
<div class="particles" id="particles"></div>

<!-- Top bar -->
<div class="top-bar">
  <div class="brand">
    <span class="brand-dot"></span>
    <span>Alzhira</span>
  </div>
  <div class="right-group">
    <div><span>2026 · </span><span data-i18n="comingSoonShort">Em breve</span></div>
    <div class="lang-toggle" role="group" aria-label="Language selector">
      <button class="lang-btn" data-lang="pt" aria-label="Português (Brasil)" title="Português">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="20" fill="#009C3B"/>
          <polygon points="14,2.4 25.4,10 14,17.6 2.6,10" fill="#FFDF00"/>
          <circle cx="14" cy="10" r="3.6" fill="#002776"/>
        </svg>
      </button>
      <button class="lang-btn" data-lang="en" aria-label="English (US)" title="English">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="20" fill="#FFFFFF"/>
          <rect width="28" height="1.54" y="0" fill="#B22234"/>
          <rect width="28" height="1.54" y="3.08" fill="#B22234"/>
          <rect width="28" height="1.54" y="6.15" fill="#B22234"/>
          <rect width="28" height="1.54" y="9.23" fill="#B22234"/>

          <rect width="28" height="1.54" y="18.46" fill="#B22234"/>
          <rect width="11.2" height="10.77" fill="#3C3B6E"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<main class="main">

  <!-- Elephant Logo -->
  <div class="elephant-wrap">
    <div class="elephant-halo"></div>
    <img class="elephant-logo" src="./assets/width_1024.webp" alt="Alzhira" width="220" height="220">
  </div>

  <!-- Wordmark -->
  <h1 class="wordmark">Alzhira</h1>

  <!-- Hero phrase -->
  <div class="hero-phrase" data-i18n-html="heroPhrase">

  </div>
  <div class="hero-sub" data-i18n="heroSub">
    Em breve, uma nova forma de cuidar de quem você ama.
  </div>

  <!-- Email capture -->

    <form class="capture-form" id="captureForm">
      <input type="email" class="capture-input" data-i18n-attr="placeholder" data-i18n="capturePlaceholder" placeholder="seu@email.com" required>
      <button type="submit" class="capture-btn">

      </button>

    <div class="success-msg" data-i18n="captureSuccess">✦ Anotamos! Você será avisado assim que chegarmos.</div>
    <div class="capture-footer" data-i18n="captureFooter">Sem spam. Só uma mensagem quando lançarmos.</div>
  </div> -->

</main>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div>© 2026 Alzhira</div>
  <div class="socials">
    <a href="mailto:contact@alzhira.ai">contact@alzhira.ai</a>
  </div>
</div>

<script>
// ===== i18n =====
const translations = {
  pt: {
    htmlLang: 'pt-BR',
    metaTitle: 'Alzhira — Em breve',
    metaDesc: 'Alzhira - Luz que não se apaga.',
    ogDesc: 'Luz que não se apaga.',
    comingSoonShort: 'Em breve',
    heroPhrase: '<em>Luz</em> que não se apaga.',
    heroSub: 'Em breve, uma nova forma de cuidar de quem você ama.',
    captureLabel: 'Seja o primeiro a saber',
    capturePlaceholder: 'seu@email.com',
    captureBtn: 'Me avise',
    captureSuccess: '✦ Anotamos! Você será avisado assim que chegarmos.',
    captureFooter: 'Sem spam. Só uma mensagem quando lançarmos.'
  },
  en: {
    htmlLang: 'en',
    metaTitle: 'Alzhira — Coming soon',
    metaDesc: 'Alzhira - A light that does not fade.',
    ogDesc: 'A light that does not fade.',
    comingSoonShort: 'Coming soon',
    heroPhrase: '<em>Light</em> that does not fade.',
    heroSub: 'Coming soon, a new way to care for the ones you love.',
    captureLabel: 'Be the first to know',
    capturePlaceholder: 'you@email.com',
    captureBtn: 'Notify me',
    captureSuccess: '✦ Got it! We will let you know as soon as we arrive.',
    captureFooter: 'No spam. Just one message when we launch.'
  }
};

function detectInitialLang(){
  try {
    const saved = localStorage.getItem('alzhira-lang');
    if (saved && translations[saved]) return saved;
  } catch(e) { /* localStorage may be unavailable */ }
  const nav = (navigator.language || 'pt').toLowerCase();
  return nav.startsWith('pt') ? 'pt' : 'en';
}

function applyLang(lang){
  const t = translations[lang];
  if (!t) return;

  // <html lang>
  document.documentElement.setAttribute('lang', t.htmlLang);

  // Text content (innerText only)
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (el.hasAttribute('data-i18n-html') || el.hasAttribute('data-i18n-attr')) return;
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });

  // HTML content (allows <em> etc.)
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // Attributes (placeholder, content of meta tags, etc.)
  document.querySelectorAll('[data-i18n-attr]').forEach(el => {
    const attr = el.getAttribute('data-i18n-attr');
    const key = el.getAttribute('data-i18n');
    if (attr && t[key] !== undefined) el.setAttribute(attr, t[key]);
  });

  // <title> uses .text, not attribute. Handle explicitly.
  if (t.metaTitle) document.title = t.metaTitle;

  // Update active flag state
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
    btn.setAttribute('aria-pressed', btn.dataset.lang === lang ? 'true' : 'false');
  });

  // Persist
  try { localStorage.setItem('alzhira-lang', lang); } catch(e) {}
}

// Wire up flag buttons
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

// Initial render
applyLang(detectInitialLang());

// ===== Floating particles =====
const particles = document.getElementById('particles');
const colors = ['', 'gold', 'rose'];
for(let i = 0; i < 40; i++){
  const p = document.createElement('div');
  p.className = 'particle ' + colors[Math.floor(Math.random()*colors.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (15 + Math.random() * 20) + 's';
  p.style.animationDelay = (Math.random() * 20) + 's';
  p.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
  particles.appendChild(p);
}

// ===== Form handling (commented out until email backend is ready) =====
const form = document.getElementById('captureForm');
const capture = document.getElementById('capture');
if (form) {
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = form.querySelector('input').value;
    if(email && email.includes('@')){
      capture.classList.add('success');
      console.log('Email captured:', email);
    }
  });
}
</script>

</body>
